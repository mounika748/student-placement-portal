<!DOCTYPE html>
<html>
<head>
    <title>Student Placement Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Student Placement Portal</h1>

<form method="POST">

    Name:<br>
    <input type="text" name="name"><br><br>

    Skills:<br>
    <input type="text" name="skills"><br><br>

    CGPA:<br>
    <input type="number" step="0.1" name="cgpa"><br><br>
    Company:<br>
<select name="company">
    <option>Hashira</option>
    <option>TCS</option>
    <option>Infosys</option>
    <option>Wipro</option>
</select>
<br><br>

    <input type="submit" value="Check Eligibility">

</form>

<h2>{{ result }}</h2>

</body>
</html>
